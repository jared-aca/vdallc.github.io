<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" fill="none">
  <defs>
    <!-- Army olive gradient: lighter at top, deep at bottom -->
    <linearGradient id="vda-body" x1="18" y1="4" x2="62" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7A9948"/>
      <stop offset="1" stop-color="#2E4418"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="vda-shine" x1="4" y1="4" x2="46" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity=".26"/>
      <stop offset=".7" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Green glow + drop shadow for dark bg -->
    <filter id="vda-shadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4.5" flood-color="#607B3A" flood-opacity=".55"/>
      <feDropShadow dx="0" dy="3"   stdDeviation="3"   flood-color="#000"    flood-opacity=".5"/>
    </filter>
    <clipPath id="vda-clip">
      <path d="M40 4L4 18V46C4 72 20 88 40 92C60 88 76 72 76 46V18Z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path
    d="M40 4L4 18V46C4 72 20 88 40 92C60 88 76 72 76 46V18Z"
    fill="url(#vda-body)"
    filter="url(#vda-shadow)"
  />

  <!-- Red chief -->
  <rect x="0" y="0" width="80" height="28" fill="#B22234" clip-path="url(#vda-clip)"/>

  <!-- Separation rule -->
  <rect x="0" y="27" width="80" height="1.5" fill="#fff" fill-opacity=".45" clip-path="url(#vda-clip)"/>

  <!-- Shine overlay -->
  <path
    d="M40 4L4 18V46C4 72 20 88 40 92C60 88 76 72 76 46V18Z"
    fill="url(#vda-shine)"
  />

  <!-- Border (more visible on dark bg) -->
  <path
    d="M40 5.5L5.5 18.8V46C5.5 71.2 21 87 40 91C59 87 74.5 71.2 74.5 46V18.8Z"
    stroke="#fff"
    stroke-opacity=".35"
    stroke-width="1.5"
  />

  <!-- 5-pointed star -->
  <polygon
    points="40,43 45,56.1 59,56.8 48.1,65.6 51.8,79.2 40,71.5 28.2,79.2 31.9,65.6 21,56.8 35,56.1"
    fill="#fff"
    opacity=".97"
  />
</svg>
